server:
  listen: "0.0.0.0:19463"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""

auth:
  secret: "change-this-secret"
  token_ttl: "24h"

adapter:
  type: "stub"
  mock_users: 0

  # Legacy single-adapter sing-box example. New deployments should prefer cores.
  # type: "singbox"
  # singbox_config_path: "/etc/sing-box/config.json"
  # config_template_path: "/etc/sing-box/config.template.json"
  # inbound_tag: "vless-in"
  # reload_command: "systemctl reload sing-box"
  # clash_api: "http://127.0.0.1:9090"
  # clash_secret: ""
  # v2ray_api: "127.0.0.1:10085"
  # subscription_domain: "vpn.example.com"
  # subscription_port: 443
  # subscription_type: "tcp"
  # subscription_tls: true

cores:
  default: "legacy"
  enabled: ["legacy"]
  items:
    legacy:
      type: "stub"
      enabled: true
      role: "primary"
      config:
        mock_users: 0

  # Example sing-box core:
  # default: "singbox-main"
  # enabled: ["singbox-main"]
  # items:
  #   singbox-main:
  #     type: "singbox"
  #     enabled: true
  #     role: "primary"
  #     config:
  #       singbox_config_path: "/etc/sing-box/config.json"
  #       config_template_path: "/etc/sing-box/config.template.json"
  #       inbound_tag: "vless-in"
  #       reload_command: "systemctl reload sing-box"
  #       clash_api: "http://127.0.0.1:9090"
  #       clash_secret: ""
  #       v2ray_api: "127.0.0.1:10085"
  #       subscription_domain: "vpn.example.com"
  #       subscription_port: 443
  #       subscription_type: "tcp"
  #       subscription_tls: true

  # Example Xray-core / V2Ray-core core:
  # default: "xray-main"
  # enabled: ["xray-main"]
  # items:
  #   xray-main:
  #     type: "xray"                # or "v2ray"; affects stats gRPC path and display name.
  #     enabled: true
  #     role: "primary"
  #     config:
  #       xray_config_path: "/etc/xray/config.json"   # v2ray_config_path is also accepted for type: "v2ray".
  #       config_template_path: "/etc/xray/config.template.json"
  #       inbound_tag: "vless-in"   # Optional. Empty means all supported protocol inbounds.
  #       reload_command: "systemctl reload xray"
  #       api_address: "127.0.0.1:10085"
  #       # stats_query_method: ""  # Optional explicit QueryStats full method override.
  #       subscription_domain: "vpn.example.com"
  #       subscription_port: 443
  #       subscription_type: "tcp"
  #       subscription_tls: true

store:
  sqlite:
    path: "./data/vpnview.db"

limits:
  global_upload_speed: 0
  global_download_speed: 0
  default_user_upload_speed: 0
  default_user_download_speed: 0
  default_quota: 0
  software_limit_strikes: 3

security:
  csp: "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'"
  hsts_enabled: true
  hsts_max_age: 31536000
  hsts_include_subdomains: true
  hsts_preload: false

subscription:
  mode: "link"
  domain: "vpn.example.com"
  template_path: ""

