<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VPNView</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <section id="login-view" class="view">
      <form id="login-form" class="login-panel" autocomplete="off">
        <div class="brand-mark">V</div>
        <h1>VPNView</h1>
        <p>节点管理与流量可视化</p>
        <label class="field">
          <span>访问密钥</span>
          <input id="login-secret" type="password" required placeholder="请输入管理员密码">
        </label>
        <button id="login-submit" class="btn primary" type="submit">登录</button>
        <div id="login-error" class="form-error hidden"></div>
      </form>
    </section>

    <section id="main-view" class="view hidden">
      <!-- Mobile Top Header -->
      <header class="mobile-header">
        <div class="mobile-header-brand">
          <div class="brand-mark small">V</div>
          <div>
            <strong>VPNView</strong>
            <span class="adapter-label-text">stub adapter</span>
          </div>
        </div>
        <button id="btn-logout-mobile" class="btn ghost icon" title="退出登录">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M16 17v-3H9v-4h7V7l5 5-5 5M14 2a2 2 0 0 1 2 2v2h-2V4H5v16h9v-2h2v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9z"/></svg>
        </button>
      </header>

      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-mark small">V</div>
          <div>
            <strong>VPNView</strong>
            <span id="adapter-label" class="adapter-label-text">stub adapter</span>
          </div>
        </div>
        <nav>
          <a id="nav-dashboard" href="#/dashboard" class="nav-link nav-dashboard active">仪表盘</a>
          <a id="nav-users" href="#/users" class="nav-link nav-users">用户管理</a>
        </nav>
        <button id="btn-logout" class="btn ghost">退出登录</button>
      </aside>

      <main class="content">
        <section id="dashboard-view" class="page">
          <header class="page-header">
            <div>
              <h2>仪表盘</h2>
              <p id="dashboard-note">基于适配器能力的实时视图</p>
            </div>
          </header>
          <div id="dashboard-stats" class="stats-grid"></div>
          <section id="connections-panel" class="panel">
            <div class="panel-header">
              <div>
                <h3>活跃连接</h3>
                <p>当适配器暴露连接数据时显示此内容</p>
              </div>
            </div>
            <div id="connections-content"></div>
          </section>
        </section>

        <section id="users-view" class="page hidden">
          <header class="page-header">
            <div>
              <h2>用户管理</h2>
              <p>创建、禁用、编辑以及分发节点订阅</p>
            </div>
            <div class="header-actions">
              <input id="users-search" class="search-input" type="search" placeholder="搜索用户">
              <button id="btn-refresh-users" class="btn ghost">刷新</button>
              <button id="btn-create-user" class="btn primary">创建用户</button>
            </div>
          </header>
          <div class="panel table-panel">
            <div class="table-scroll">
              <table>
                <thead id="users-head"></thead>
                <tbody id="users-body"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>

      <!-- Mobile Bottom Navigation Bar -->
      <nav class="mobile-bottom-nav">
        <a href="#/dashboard" class="nav-link nav-dashboard active">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          <span>仪表盘</span>
        </a>
        <a href="#/users" class="nav-link nav-users">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <span>用户管理</span>
        </a>
      </nav>
    </section>

    <div id="modal-root" class="modal-root hidden"></div>
    <div id="toast-root" class="toast-root"></div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/users.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
